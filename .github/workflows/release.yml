name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Read release notes
        id: release_notes
        run: |
          version=$(cat VERSION)
          notes=$(awk '/^## \['"$version"'\]/ {found=1; next} found && /^## / {exit} found {print}' CHANGELOG.md)
          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$notes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./cardmarket
          load: true
          tags: cardmarket:${{ steps.version.outputs.version }}

      - name: Save Docker image as tarball
        run: |
          docker save cardmarket:${{ steps.version.outputs.version }} -o cardmarket-${{ steps.version.outputs.version }}.tar

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.release_notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: cardmarket-${{ steps.version.outputs.version }}.tar
          asset_name: cardmarket-${{ steps.version.outputs.version }}.tar
          asset_content_type: application/x-tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
