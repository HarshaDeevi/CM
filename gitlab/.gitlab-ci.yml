stages:
  - build
  - release

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  only:
    - main
  script:
    - docker build -t cardmarket:latest ./cardmarket

release:
  stage: release
  image: docker:24
  services:
    - docker:24-dind
  only:
    - tags
  script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
    - docker build -t ghcr.io/harshadeevi/cardmarket:$CI_COMMIT_TAG ./cardmarket
    - docker push ghcr.io/harshadeevi/cardmarket:$CI_COMMIT_TAG
