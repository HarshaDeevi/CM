
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -t ghcr.io/harshadeevi/cardmarket:${{ github.ref_name }} ./cardmarket
          docker push ghcr.io/harshadeevi/cardmarket:${{ github.ref_name }}
